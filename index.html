<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-zinc-900 dark:bg-black dark:text-zinc-50 p-6 md:p-10 transition-colors duration-200 min-h-screen relative">

    <button onclick="toggleTheme()" class="absolute top-6 right-6 md:top-10 md:right-10 p-2 text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors" aria-label="Toggle Theme">
        <i data-lucide="sun-moon" class="w-6 h-6"></i>
    </button>

    <header class="flex flex-col md:flex-row md:items-end justify-between mb-10 pb-6 border-b border-zinc-200 dark:border-zinc-800 pr-12">
        <div>
            <div class="flex items-center gap-4 mb-1">
                <h1 id="dashboard-title" class="text-2xl font-bold tracking-tight"></h1>
                <span id="status-badge" class="px-2.5 py-0.5 rounded-full text-xs font-medium border text-zinc-500 border-zinc-200 bg-zinc-50 dark:border-zinc-800 dark:bg-zinc-900">
                    WAITING FOR DATA
                </span>
            </div>
            <p class="text-sm text-zinc-500 dark:text-zinc-400">Live 5-minute rolling window</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white dark:bg-black border border-zinc-200 dark:border-zinc-800 rounded-lg p-5">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="cpu" class="text-zinc-400 w-5 h-5"></i>
                    <h2 class="text-sm font-semibold tracking-wide text-zinc-600 dark:text-zinc-300 uppercase">CPU Utilization</h2>
                </div>
                <span class="text-xl font-mono tracking-tight" id="cpu-val">--%</span>
            </div>
            <div class="relative h-48 w-full">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <div class="bg-white dark:bg-black border border-zinc-200 dark:border-zinc-800 rounded-lg p-5">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="memory-stick" class="text-zinc-400 w-5 h-5"></i>
                    <h2 class="text-sm font-semibold tracking-wide text-zinc-600 dark:text-zinc-300 uppercase">Memory Usage</h2>
                </div>
                <span class="text-xl font-mono tracking-tight" id="mem-val">--%</span>
            </div>
            <div class="relative h-48 w-full">
                <canvas id="memChart"></canvas>
            </div>
        </div>

        <div class="bg-white dark:bg-black border border-zinc-200 dark:border-zinc-800 rounded-lg p-5 lg:col-span-2">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-down-up" class="text-zinc-400 w-5 h-5"></i>
                    <h2 class="text-sm font-semibold tracking-wide text-zinc-600 dark:text-zinc-300 uppercase">Network Throughput</h2>
                </div>
                <div class="flex gap-6 text-right font-mono tracking-tight">
                    <div>
                        <span class="text-xs text-zinc-500 mr-2">RX</span>
                        <span class="text-lg" id="net-down-val">-- kbps</span>
                    </div>
                    <div>
                        <span class="text-xs text-zinc-500 mr-2">TX</span>
                        <span class="text-lg" id="net-up-val">-- kbps</span>
                    </div>
                </div>
            </div>
            <div class="relative h-56 w-full">
                <canvas id="netChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const DASHBOARD_TITLE = "Homelab Telemetry";
        
        // Apply Title
        document.getElementById('dashboard-title').innerText = DASHBOARD_TITLE;
        document.title = DASHBOARD_TITLE;

        // Initialize Icons
        lucide.createIcons();

        // --- Theme & Gradient Management ---
        function getDynamicGradient(chartId, r, g, b) {
            const canvas = document.getElementById(chartId);
            if (!canvas) return null;
            const ctx = canvas.getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            
            // Dark mode gets a stronger 40% opacity fill, Light mode gets a softer 15% opacity fill
            const topOpacity = isDark ? 0.4 : 0.15; 
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${topOpacity})`);
            gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
            return gradient;
        }

        function updateChartTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            Chart.defaults.color = isDark ? '#71717a' : '#a1a1aa'; 
            Chart.defaults.borderColor = isDark ? '#27272a' : '#f4f4f5'; 
            
            // Reapply fills whenever theme changes so they look correct in both modes
            if(window.cpuChart) {
                window.cpuChart.data.datasets[0].backgroundColor = getDynamicGradient('cpuChart', 59, 130, 246);
                window.cpuChart.update();
            }
            if(window.memChart) {
                window.memChart.data.datasets[0].backgroundColor = getDynamicGradient('memChart', 139, 92, 246);
                window.memChart.update();
            }
            if(window.netChart) {
                window.netChart.data.datasets[0].backgroundColor = getDynamicGradient('netChart', 16, 185, 129);
                window.netChart.data.datasets[1].backgroundColor = getDynamicGradient('netChart', 244, 63, 94);
                window.netChart.update();
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            updateChartTheme();
        }

        // --- Chart Initializations ---
        // --- Chart Initializations ---
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // Keeps polling instant without UI lag
            plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
            scales: {
                x: { grid: { display: false }, ticks: { maxTicksLimit: 6, font: { family: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace' } } },
                y: { min: 0, max: 100, border: { display: false }, ticks: { font: { family: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace' } } }
            },
            elements: { point: { radius: 0, hitRadius: 10, hoverRadius: 4 } },
            interaction: { mode: 'nearest', axis: 'x', intersect: false }
        };

        window.cpuChart = new Chart(document.getElementById('cpuChart').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', borderWidth: 2, fill: true, tension: 0.4, cubicInterpolationMode: 'monotone' }] },
            options: commonOptions
        });

        window.memChart = new Chart(document.getElementById('memChart').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#8b5cf6', borderWidth: 2, fill: true, tension: 0.4, cubicInterpolationMode: 'monotone' }] },
            options: commonOptions
        });

        const netOptions = JSON.parse(JSON.stringify(commonOptions));
        delete netOptions.scales.y.max; 
        
        window.netChart = new Chart(document.getElementById('netChart').getContext('2d'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [
                    { label: 'Download', data: [], borderColor: '#10b981', borderWidth: 2, fill: true, tension: 0.4, cubicInterpolationMode: 'monotone' },
                    { label: 'Upload', data: [], borderColor: '#f43f5e', borderWidth: 2, fill: true, tension: 0.4, cubicInterpolationMode: 'monotone' }
                ] 
            },
            options: netOptions
        });

        // Apply theme fills on initial load
        updateChartTheme();

        // --- Data Fetching Logic ---
        async function fetchTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                const result = await response.json();
                
                const badge = document.getElementById('status-badge');
                if (result.status === 'DOWN') {
                    badge.textContent = 'SERVER DOWN';
                    badge.className = 'px-2.5 py-0.5 rounded-full text-xs font-semibold border text-rose-600 border-rose-200 bg-rose-50 dark:text-rose-400 dark:border-rose-900/50 dark:bg-rose-950/50';
                } else if (result.status === 'UP') {
                    badge.textContent = 'SYSTEM ONLINE';
                    badge.className = 'px-2.5 py-0.5 rounded-full text-xs font-semibold border text-emerald-600 border-emerald-200 bg-emerald-50 dark:text-emerald-400 dark:border-emerald-900/50 dark:bg-emerald-950/50';
                }

                if (!result.telemetry || result.telemetry.length === 0) return;

                const sortedData = result.telemetry.reverse(); 
                const labels = [], cpuData = [], memData = [], downData = [], upData = [];

                sortedData.forEach(item => {
                    const date = new Date(item.timestamp);
                    labels.push(date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }));
                    cpuData.push(item.cpu_percent);
                    memData.push(item.memory.percent);
                    downData.push(item.network.download_kbps);
                    upData.push(item.network.upload_kbps);
                });

                window.cpuChart.data.labels = window.memChart.data.labels = window.netChart.data.labels = labels;
                window.cpuChart.data.datasets[0].data = cpuData; 
                window.memChart.data.datasets[0].data = memData; 
                window.netChart.data.datasets[0].data = downData;
                window.netChart.data.datasets[1].data = upData;
                
                window.cpuChart.update(); window.memChart.update(); window.netChart.update();

                const latest = sortedData[sortedData.length - 1];
                if(latest) {
                    document.getElementById('cpu-val').innerText = `${latest.cpu_percent.toFixed(1)}%`;
                    document.getElementById('mem-val').innerText = `${latest.memory.percent.toFixed(1)}%`;
                    document.getElementById('net-down-val').innerText = `${latest.network.download_kbps.toFixed(0)} kbps`;
                    document.getElementById('net-up-val').innerText = `${latest.network.upload_kbps.toFixed(0)} kbps`;
                }
            } catch (error) {
                console.error("Waiting for telemetry data...", error);
            }
        }

        fetchTelemetry();
        setInterval(fetchTelemetry, 5000);
    </script>
</body>
</html>
