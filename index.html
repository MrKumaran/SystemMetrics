<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Clean, Dark-Mode CSS */
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --border: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .header { margin-bottom: 2rem; }
        .header h1 { margin: 0 0 0.5rem 0; font-size: 1.75rem; }
        .header p { margin: 0; color: var(--text-muted); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .card-header h2 { margin: 0; font-size: 1.25rem; }
        .value { font-size: 1.5rem; font-weight: bold; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        /* Utility colors */
        .text-blue { color: #60a5fa; }
        .text-purple { color: #c084fc; }
        .text-green { color: #34d399; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Homelab Performance</h1>
        <p>Live 5-minute telemetry window (Vanilla JS)</p>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">
                <h2>CPU Usage</h2>
                <span class="value text-blue" id="cpu-val">--%</span>
            </div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Memory</h2>
                <span class="value text-purple" id="mem-val">--%</span>
            </div>
            <div class="chart-container">
                <canvas id="memChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Initialize Chart.js ---
        // Global defaults for a dark theme
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#1e293b';

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // Turn off animation for smooth live updates
            scales: {
                x: { ticks: { maxTicksLimit: 10 } },
                y: { min: 0, max: 100 }
            },
            elements: { point: { radius: 0 } } // Hide dots like Task Manager
        };

        const cpuCtx = document.getElementById('cpuChart').getContext('2d');
        const cpuChart = new Chart(cpuCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'CPU %', data: [], borderColor: '#60a5fa', backgroundColor: 'rgba(96, 165, 250, 0.1)', fill: true, tension: 0.4 }] },
            options: commonOptions
        });

        const memCtx = document.getElementById('memChart').getContext('2d');
        const memChart = new Chart(memCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Memory %', data: [], borderColor: '#c084fc', backgroundColor: 'rgba(192, 132, 252, 0.1)', fill: true, tension: 0.4 }] },
            options: commonOptions
        });


        // --- 2. Fetch Data Logic ---
        async function fetchTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                const data = await response.json();

                // Assuming data is an array of the last 60 JSON objects from your Ubuntu server
                // Reverse it if your DB sends newest first, so graph goes left to right
                const sortedData = data.reverse(); 

                const labels = [];
                const cpuData = [];
                const memData = [];

                sortedData.forEach(item => {
                    const date = new Date(item.timestamp);
                    labels.push(date.toLocaleTimeString([], { hour12: false }));
                    cpuData.push(item.cpu_percent);
                    memData.push(item.memory.percent);
                });

                // Update Charts
                cpuChart.data.labels = labels;
                cpuChart.data.datasets[0].data = cpuData;
                cpuChart.update();

                memChart.data.labels = labels;
                memChart.data.datasets[0].data = memData;
                memChart.update();

                // Update Text Values
                const latest = sortedData[sortedData.length - 1];
                if(latest) {
                    document.getElementById('cpu-val').innerText = `${latest.cpu_percent.toFixed(1)}%`;
                    document.getElementById('mem-val').innerText = `${latest.memory.percent.toFixed(1)}%`;
                }

            } catch (error) {
                console.error("Error fetching telemetry:", error);
            }
        }

        // Fetch immediately, then every 5 seconds
        fetchTelemetry();
        setInterval(fetchTelemetry, 5000);
    </script>
</body>
</html>
