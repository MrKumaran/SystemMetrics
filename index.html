<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        // Configure Tailwind dark mode colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-200 p-8 font-sans min-h-screen">

    <header class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight text-white">Homelab Performance</h1>
        <p class="text-slate-400">Live 5-minute telemetry window (Upgraded Vanilla)</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-lg">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="cpu" class="text-blue-400 w-6 h-6"></i>
                    <h2 class="text-xl font-medium">CPU Usage</h2>
                </div>
                <span class="text-2xl font-bold text-blue-400" id="cpu-val">--%</span>
            </div>
            <div class="relative h-64 w-full">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-lg">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="memory-stick" class="text-purple-400 w-6 h-6"></i>
                    <h2 class="text-xl font-medium">Memory</h2>
                </div>
                <div class="text-right">
                    <span class="text-2xl font-bold text-purple-400" id="mem-val">--%</span>
                </div>
            </div>
            <div class="relative h-64 w-full">
                <canvas id="memChart"></canvas>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-lg lg:col-span-2">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="network" class="text-emerald-400 w-6 h-6"></i>
                    <h2 class="text-xl font-medium">Network Throughput</h2>
                </div>
                <div class="flex gap-6 text-right">
                    <div>
                        <p class="text-xs text-slate-400">Download</p>
                        <span class="text-lg font-bold text-emerald-400" id="net-down-val">-- Kbps</span>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400">Upload</p>
                        <span class="text-lg font-bold text-orange-400" id="net-up-val">-- Kbps</span>
                    </div>
                </div>
            </div>
            <div class="relative h-64 w-full">
                <canvas id="netChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Global Chart Defaults
        Chart.defaults.color = '#64748b';
        Chart.defaults.borderColor = '#334155';
        
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } },
                y: { min: 0, max: 100, border: { dash: [4, 4] } }
            },
            elements: { point: { radius: 0 } }
        };

        // Initialize Charts with "Area" fill styling
        const cpuChart = new Chart(document.getElementById('cpuChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#60a5fa', backgroundColor: 'rgba(59, 130, 246, 0.2)', fill: true, tension: 0.4 }] },
            options: commonOptions
        });

        const memChart = new Chart(document.getElementById('memChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#c084fc', backgroundColor: 'rgba(168, 85, 247, 0.2)', fill: true, tension: 0.4 }] },
            options: commonOptions
        });

        // Network Chart doesn't have a 100 max limit, so we copy options and delete max Y
        const netOptions = JSON.parse(JSON.stringify(commonOptions));
        delete netOptions.scales.y.max;
        netOptions.plugins.legend = { display: true, labels: { color: '#cbd5e1' } };

        const netChart = new Chart(document.getElementById('netChart'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [
                    { label: 'Download', data: [], borderColor: '#34d399', backgroundColor: 'rgba(52, 211, 153, 0.1)', fill: true, tension: 0.4 },
                    { label: 'Upload', data: [], borderColor: '#fb923c', backgroundColor: 'rgba(251, 146, 60, 0.1)', fill: true, tension: 0.4 }
                ] 
            },
            options: netOptions
        });

        // Fetch Data Logic
        async function fetchTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                const result = await response.json();
                
                // --- NEW STATUS LOGIC ---
                const headerTitle = document.querySelector('.header h1');
                if (result.status === 'DOWN') {
                    headerTitle.innerHTML = 'Homelab Performance <span class="text-red-500 text-sm ml-4 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">SERVER DOWN</span>';
                } else {
                    headerTitle.innerHTML = 'Homelab Performance <span class="text-emerald-500 text-sm ml-4 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">SERVER UP</span>';
                }

                // Get the actual data array and reverse it
                const sortedData = result.telemetry.reverse(); 

                const labels = [];
                const cpuData = [], memData = [], downData = [], upData = [];

                sortedData.forEach(item => {
                    const date = new Date(item.timestamp);
                    labels.push(date.toLocaleTimeString([], { hour12: false }));
                    cpuData.push(item.cpu_percent);
                    memData.push(item.memory.percent);
                    downData.push(item.network.download_kbps);
                    upData.push(item.network.upload_kbps);
                });

                cpuChart.data.labels = memChart.data.labels = netChart.data.labels = labels;
                
                cpuChart.data.datasets[0].data = cpuData; cpuChart.update();
                memChart.data.datasets[0].data = memData; memChart.update();
                netChart.data.datasets[0].data = downData;
                netChart.data.datasets[1].data = upData;
                netChart.update();

                const latest = sortedData[sortedData.length - 1];
                if(latest) {
                    document.getElementById('cpu-val').innerText = `${latest.cpu_percent.toFixed(1)}%`;
                    document.getElementById('mem-val').innerText = `${latest.memory.percent.toFixed(1)}%`;
                    document.getElementById('net-down-val').innerText = `${latest.network.download_kbps.toFixed(0)} Kbps`;
                    document.getElementById('net-up-val').innerText = `${latest.network.upload_kbps.toFixed(0)} Kbps`;
                }
            } catch (error) {
                console.error("Waiting for telemetry data...");
            }
        }

        fetchTelemetry();
        setInterval(fetchTelemetry, 5000);
    </script>
</body>
</html>
